<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="al-edge-t" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2bd4c0"/>
      <stop offset="1" stop-color="#7c5cff"/>
    </linearGradient>
  </defs>
  <!-- edges -->
  <g stroke="url(#al-edge-t)" stroke-width="2.6" stroke-linecap="round" opacity="0.95">
    <line x1="20" y1="22" x2="33" y2="32"/>
    <line x1="44" y1="18" x2="33" y2="32"/>
    <line x1="46" y1="44" x2="33" y2="32"/>
    <line x1="20" y1="46" x2="33" y2="32"/>
    <line x1="20" y1="22" x2="20" y2="46"/>
    <line x1="44" y1="18" x2="46" y2="44"/>
  </g>
  <!-- nodes (colours chosen to read on BOTH light and dark backgrounds) -->
  <g>
    <circle cx="20" cy="22" r="4.2" fill="#12b8a4"/>
    <circle cx="44" cy="18" r="4.2" fill="#7c5cff"/>
    <circle cx="46" cy="44" r="4.2" fill="#12b8a4"/>
    <circle cx="20" cy="46" r="4.2" fill="#7c5cff"/>
    <circle cx="33" cy="32" r="5"   fill="#4d9bff"/>
  </g>
</svg>
