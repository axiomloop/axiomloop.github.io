<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="al-edge-a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38f5d4"/>
      <stop offset="1" stop-color="#7c5cff"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0a0e17"/>
  <!-- edges -->
  <g stroke="url(#al-edge-a)" stroke-width="2.4" stroke-linecap="round" opacity="0.9">
    <line x1="20" y1="22" x2="33" y2="32"/>
    <line x1="44" y1="18" x2="33" y2="32"/>
    <line x1="46" y1="44" x2="33" y2="32"/>
    <line x1="20" y1="46" x2="33" y2="32"/>
    <line x1="20" y1="22" x2="20" y2="46"/>
    <line x1="44" y1="18" x2="46" y2="44"/>
  </g>
  <!-- glow halos (pulsing) -->
  <g>
    <circle cx="20" cy="22" r="7.6" fill="#38f5d4" opacity="0.16">
      <animate attributeName="opacity" values="0.05;0.3;0.05" dur="2.4s" begin="0s" repeatCount="indefinite"/></circle>
    <circle cx="44" cy="18" r="7.6" fill="#7c5cff" opacity="0.16">
      <animate attributeName="opacity" values="0.05;0.3;0.05" dur="2.4s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="46" cy="44" r="7.6" fill="#38f5d4" opacity="0.16">
      <animate attributeName="opacity" values="0.05;0.3;0.05" dur="2.4s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="20" cy="46" r="7.6" fill="#7c5cff" opacity="0.16">
      <animate attributeName="opacity" values="0.05;0.3;0.05" dur="2.4s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="33" cy="32" r="8.7" fill="#eafcff" opacity="0.16">
      <animate attributeName="opacity" values="0.05;0.3;0.05" dur="2.4s" begin="1.2s" repeatCount="indefinite"/></circle>
  </g>
  <!-- nodes (pulsing) -->
  <g>
    <circle cx="20" cy="22" r="4" fill="#38f5d4">
      <animate attributeName="opacity" values="1;0.4;1" dur="2.4s" begin="0s" repeatCount="indefinite"/></circle>
    <circle cx="44" cy="18" r="4" fill="#7c5cff">
      <animate attributeName="opacity" values="1;0.4;1" dur="2.4s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="46" cy="44" r="4" fill="#38f5d4">
      <animate attributeName="opacity" values="1;0.4;1" dur="2.4s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="20" cy="46" r="4" fill="#7c5cff">
      <animate attributeName="opacity" values="1;0.4;1" dur="2.4s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="33" cy="32" r="4.6" fill="#eafcff">
      <animate attributeName="opacity" values="1;0.4;1" dur="2.4s" begin="1.2s" repeatCount="indefinite"/></circle>
  </g>
</svg>
